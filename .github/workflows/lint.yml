name: Linting and style checking

on:
    pull_request:
        types:
            - opened
            - synchronize
            - edited

jobs:
    check:
        name: Check (luacheck, lua-language-server, stylua)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up mise
              uses: jdx/mise-action@v2

            # luacheck is a luarocks package (no mise binary backend), so it must be
            # installed separately before the check task runs.
            - name: Install luacheck
              run: mise run setup

            - name: Run checks
              run: mise run check
